/* ── Responsive Grids ── */

.rg-4g16{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.rg-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

.app-sidebar{transition:transform .25s ease}

.mob-ham{display:none!important}

.spin{width:36px;height:36px;border:3px solid #E8ECEF;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}

.mod-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
@media(max-width:768px){
  .mod-header{flex-direction:column;align-items:stretch}

    <div>

            <text x={PAD-6} y={H-t*H+4} textAnchor="end" fontSize="9" fill="#99AABB">{(max*t/1e6).toFixed(0)}M</text>
          </g>
        ))}

          let y = H;
          return (
            <g key={i}>
              {CATS.map(cat=>{
                const h = Math.max(sc(d[cat.key]||0), 0);
                y -= h;
                return <rect key={cat.key} x={x-bw/2} y={y} width={bw} height={h} fill={cat.color} rx={cat===CATS[0]?"4":"0"}/>;
              }).reverse()}
              <text x={x} y={H+16} textAnchor="middle" fontSize="10" fill="#667788">{d.month}</text>
              <text x={x} y={H-sc(d.total)-6} textAnchor="middle" fontSize="8" fill="#445566" fontWeight="700">{(d.total/1e6).toFixed(1)}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:4}}>
        {CATS.map(c=>(
          <span key={c.key} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#666666'}}>
            <span style={{width:10,height:10,borderRadius:3,background:c.color,display:'inline-block'}}/>
            {c.label}
          </span>
        ))}
      </div>
    </div>
  );
}

            <div style={{background:'#F5F5F5',borderRadius:8,padding:14,marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:12,color:'#666666'}}>Нийт (НӨАТ-гүй):</span>
                <span style={{fontSize:13,fontWeight:700,color:'#1A1A1A'}}>{fmt(subtotal)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:12,color:'#666666'}}>НӨАТ (10%):</span>
                <span style={{fontSize:13,fontWeight:700,color:'#1A1A1A'}}>{fmt(vat)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',paddingTop:8,borderTop:'0.5px solid #E8E8E8'}}>
                <span style={{fontSize:14,fontWeight:700,color:'#1A1A1A'}}>Нийт дүн:</span>
                <span style={{fontSize:20,fontWeight:700,color:'#534AB7'}}>{fmt(total)}</span>
              </div>
            </div>

            {/* Terms of Service */}
            <div style={{background:agreed?'#F0FDF4':'#FFFBEB',border:`1px solid ${agreed?'#BBF7D0':'#FDE68A'}`,borderRadius:8,padding:14,marginBottom:12,transition:'all .2s'}}>
              <p style={{margin:'0 0 10px',fontSize:12,color:'#633806',lineHeight:1.6}}>
                <Ic n="info-circle-fill" s={12} style={{color:'#D97706',marginRight:5,verticalAlign:'middle'}}/>
                Та захиалга баталгаажуулснаар манай үйлчилгээний нөхцөлийг зөвшөөрсөнд тооцох болохыг анхаарна уу.
              </p>
              <label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}}>
                <div style={{position:'relative',flexShrink:0,marginTop:1}}>
                  <input
                    type="checkbox"
                    checked={agreed}
                    onChange={e=>setAgreed(e.target.checked)}
                    style={{position:'absolute',opacity:0,width:18,height:18,margin:0,cursor:'pointer'}}
                  />
                  <div style={{
                    width:18,height:18,borderRadius:5,border:`2px solid ${agreed?'#16A34A':'#D1D5DB'}`,
                    background:agreed?'#16A34A':'#fff',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'all .15s',pointerEvents:'none'
                  }}>
                    {agreed && <Ic n="check2" s={11} style={{color:'#fff'}}/>}
                  </div>
                </div>
                <span style={{fontSize:12,color:agreed?'#15803D':'#334155',fontWeight:600,lineHeight:1.6,userSelect:'none'}}>
                  Би үйлчилгээний нөхцөлтэй бүрэн танилцаж, ойлгож хүлээн зөвшөөрч байна.
                </span>
              </label>
            </div>

            <Btn
              onClick={()=>{ if(!agreed) return; onSubmit(); setOk(true); setAgreed(false); setTimeout(()=>setOk(false),3000); }}
              icon="send" full size="lg"
              disabled={!agreed}
            >Захиалга илгээх</Btn>
            {!agreed && <p style={{margin:'6px 0 0',fontSize:11,color:'#D97706',textAlign:'center',fontWeight:600}}>Үйлчилгээний нөхцөлийг зөвшөөрсний дараа захиалга илгээх боломжтой</p>}
            {agreed && <p style={{margin:'6px 0 0',fontSize:11,color:'#999999',textAlign:'center'}}>Захиалга илгээсний дараа борлуулалтын ажилтан баталгаажуулна</p>}
          </div>
        )}
      </div>
    </div>
  );
}

    "Дата үйлчилгээ":               {bg:"#FAEEDA",icon:"#D97706"},

  };

  const addToCart = (item) => {
    setCart(prev=>{
      const idx = prev.findIndex(c=>c.id===item.id);
      if(idx>=0){
        const updated = [...prev];
        updated[idx] = {...updated[idx], qty:updated[idx].qty+item.qty, note:item.note||updated[idx].note};
        return updated;
      }
      return [...prev, item];
    });
    setAdded(item.name);
    setTimeout(()=>setAdded(null), 2500);
    setCartOpen(true);

  const updateCart = (idx, qty) => setCart(prev=>prev.map((it,i)=>i===idx?{...it,qty}:it));

    setCart([]);
    setCartOpen(false);
    setOrderSuccess(true);

              {categories.map(c=><option key={c}>{c}</option>)}

            {label:"Шийдвэрлэлтийн хувь",value:`${perfSummary.resolvedPct||96.3}%`,sub:`Зорилт: 95%`,icon:"check-circle-fill",iconBg:"#D1FAE5",iconC:"#059669",vc:'#059669'},
            {label:"Системийн хэвийн ажиллагаа",value:`${perfSummary.uptime||99.95}%`,sub:"Зорилт: 99.9%",icon:"activity",iconBg:"#D1FAE5",iconC:"#059669",vc:'#059669'},
          ].map(({label,value,sub,icon,iconBg,iconC,vc})=>(

                <p style={{margin:'0 0 3px',fontSize:22,fontWeight:700,color:vc}}>{value}</p>

        </div>
        {/* Table */}
        <TableWrap>
          <thead>
            <tr>
              <TH>Үзүүлэх үйлчилгээ</TH>
              <TH>KPI / SLA</TH>
              <TH>Бодит гүйцэтгэл</TH>
              <TH>Тайлбар</TH>
              <TH>Дэлгэрэнгүй</TH>
            </tr>

          <tbody>
            {filteredPerf.map(pd=>
              (catFilter==="Бүх чиглэл"?pd.kpis:pd.kpis.filter(k=>k.category===catFilter)).map((k,i)=>(
                <tr key={pd.actId+i} onMouseEnter={e=>e.currentTarget.style.background='#F4F6F8'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <TD>
                    <span style={{fontSize:13,fontWeight:600,color:'#1A1A1A'}}>{k.name}</span>
                    <p style={{margin:'2px 0 0',fontSize:11,color:'#999999'}}>{k.category}</p>
                  </TD>
                  <TD><span style={{fontSize:13,color:'#555555'}}>{k.kpi}</span></TD>
                  <TD>
                    <span style={{fontSize:13,fontWeight:700,background:k.met?'#D1FAE5':'#FEF3C7',color:k.met?'#065F46':'#92400E',padding:'3px 10px',borderRadius:69}}>{k.actual}</span>

                  <TD><span style={{fontSize:12,color:'#666666'}}>{k.note}</span></TD>

      {actPopup&&<ActPopup pd={actPopup}/>}

}

// ── MODULE 5: Contracts ───────────────────────────────────────
function ContractModule() {
  const [page, setPage]     = useState("list"); // "list" | "detail"
  const [filter, setFilter] = useState("all");
  const [list, setList]     = useState(contracts);
  const [selC, setSelC]     = useState(null);
  const [sign, setSign]     = useState(false);
  const [rej, setRej]       = useState(false);
  const [agreed, setAgreed] = useState(false);
  const [reason, setReason] = useState("");
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [alertDismissed, setAlertDismissed] = useState(false);
  const [filesSaved, setFilesSaved] = useState(false);
  const fileInputRef = React.useRef(null);

  const handleFileChange = (e) => {
    const files = Array.from(e.target.files);
    const mapped = files.map(f=>({
      name:f.name, size:f.size, type:f.type, url:URL.createObjectURL(f)
    }));
    setUploadedFiles(p=>[...p,...mapped]);
    e.target.value="";
  };
  const removeFile = (idx) => setUploadedFiles(p=>p.filter((_,i)=>i!==idx));

  const fileIcon = (name) => {
    const ext = name.split('.').pop().toLowerCase();
    if(ext==='pdf') return {n:"file-earmark-pdf",color:"#EF4444",bg:"#FEE2E2"};
    if(['doc','docx'].includes(ext)) return {n:"file-earmark-word",color:"#534AB7",bg:"#EEEDFE"};
    if(['xls','xlsx'].includes(ext)) return {n:"file-earmark-excel",color:"#059669",bg:"#EAF3DE"};
    if(['png','jpg','jpeg'].includes(ext)) return {n:"file-earmark-image",color:"#7C3AED",bg:"#EDE9FE"};
    return {n:"file-earmark",color:"#666666",bg:"#F4F6F8"};
  };
  const fmtSize = (b) => b<1024?`${b}B`:b<1048576?`${(b/1024).toFixed(1)}KB`:`${(b/1048576).toFixed(1)}MB`;

  const doSign = () => {
    const updated = {...selC, status:"Идэвхтэй", signed:true};
    setList(p=>p.map(c=>c.id===selC.id ? updated : c));
    setSelC(updated);
    setSign(false); setAgreed(false);
  };
  const doRej = () => {
    const updated = {...selC, status:"Цуцлагдсан"};
    setList(p=>p.map(c=>c.id===selC.id ? updated : c));
    setSelC(updated);
    setRej(false); setReason("");
  };

  const openDetail = (c) => { setSelC(c); setPage("detail"); };

  const statusOpts = ["all","Идэвхтэй","Хугацаа дуусах дөхсөн","Батлах хүлээгдэж буй","Хугацаа дууссан","Цуцлагдсан"];

  const cBadge = (status) => {
    const map = {
      "Идэвхтэй":              {bg:"#EAF3DE",color:"#3B6D11"},
      "Хугацаа дуусах дөхсөн": {bg:"#FAEEDA",color:"#633806"},
      "Батлах хүлээгдэж буй":  {bg:"#EDE9FE",color:"#5B21B6"},
      "Хугацаа дууссан":       {bg:"#F4F6F8",color:"#666666"},
      "Цуцлагдсан":            {bg:"#FEE2E2",color:"#991B1B"},
    };
    const s = map[status]||{bg:"#F4F6F8",color:"#666666"};
    return <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:69,background:s.bg,color:s.color,whiteSpace:'nowrap'}}>{status}</span>;
  };

  const leftBorder = (status) => {
    if(status==="Батлах хүлээгдэж буй") return "#7C3AED";
    if(status==="Хугацаа дуусах дөхсөн") return "#F59E0B";
    if(status==="Идэвхтэй") return "#10B981";
    if(status==="Хугацаа дууссан") return "#C8D0D8";
    if(status==="Цуцлагдсан") return "#EF4444";
    return "#E8ECEF";
  };

  const filtered = filter==="all" ? list : list.filter(c=>c.status===filter);

  // ── DETAIL PAGE ──────────────────────────────────────────────
  if(page==="detail" && selC) {
    const c = selC;
    const isPending = c.status==="Батлах хүлээгдэж буй";
    const isExpiring = c.status==="Хугацаа дуусах дөхсөн";
    const isCancelled = c.status==="Цуцлагдсан";
    const isExpired = c.status==="Хугацаа дууссан";
    return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Back nav */}
        <button onClick={()=>setPage("list")} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',cursor:'pointer',color:'#666666',fontSize:13,fontWeight:600,padding:0,width:'fit-content'}}>
          <Ic n="arrow-left" s={13}/> Гэрээний жагсаалт
        </button>

        {/* Full-width status alert banner */}
        {(isPending||isExpiring) && !alertDismissed && (
          <div style={{
            background:isPending?'#F5F3FF':'#FFFBEB',
            border:`1px solid ${isPending?'#DDD6FE':'#FDE68A'}`,
            borderRadius:8,
            padding:'12px 18px',
            display:'flex',
            alignItems:'center',
            gap:12
          }}>
            <div style={{width:32,height:32,borderRadius:8,
              background:isPending?'#EDE9FE':'#FEF3C7',
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ic n="exclamation-triangle-fill" s={14} style={{color:isPending?'#7C3AED':'#F59E0B'}}/>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:'0 0 2px',fontSize:12,fontWeight:700,
                color:isPending?'#5B21B6':'#92400E',textTransform:'uppercase',letterSpacing:.4}}>
                {isPending?'Баталгаажуулалт хүлээгдэж байна':'Хугацаа дуусах дөхсөн'}
              </p>
              <p style={{margin:0,fontSize:13,color:isPending?'#5B21B6':'#92400E',lineHeight:1.5}}>
                {c.note}
              </p>
            </div>
            <button
              onClick={()=>setAlertDismissed(true)}
              style={{background:'none',border:'none',cursor:'pointer',color:isPending?'#7C3AED':'#D97706',
                display:'flex',alignItems:'center',justifyContent:'center',
                width:28,height:28,borderRadius:6,flexShrink:0,transition:'background .12s'}}
              onMouseEnter={e=>e.currentTarget.style.background=isPending?'#EDE9FE':'#FEF3C7'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              title="Хаах">
              <Ic n="x-lg" s={13}/>
            </button>
          </div>
        )}

        {/* Hero */}
        <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderLeft:`4px solid ${leftBorder(c.status)}`,borderRadius:8,padding:'20px 24px',boxShadow:'none'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
            <div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:12,color:'#999999',fontWeight:600}}>{c.type} · <span style={{color:'#534AB7'}}>#{c.id}</span></span>
                {cBadge(c.status)}
              </div>
              <h2 style={{margin:'0 0 6px',fontSize:20,fontWeight:700,color:'#1A1A1A'}}>{c.title}</h2>
              <p style={{margin:0,fontSize:13,color:'#666666'}}>{c.parties.provider} — {c.parties.client}</p>
            </div>
            {c.amount && (
              <div style={{textAlign:'right'}}>
                <p style={{margin:0,fontSize:11,color:'#999999',fontWeight:600,textTransform:'uppercase',letterSpacing:.4}}>Нийт дүн</p>
                <p style={{margin:'4px 0 0',fontSize:24,fontWeight:700,color:'#534AB7'}}>{fmt(c.amount)}</p>
                <p style={{margin:'2px 0 0',fontSize:11,color:'#999999'}}>НӨАТ орсон</p>
              </div>
            )}
          </div>

          {/* Info pills */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginTop:18,paddingTop:18,borderTop:'0.5px solid #EBEBEB'}}>
            {[
              {label:isPending?'Үүссэн огноо':'Эхэлсэн огноо', value:c.startDate, color:'#1A1A1A'},
              {label:'Дуусах огноо', value:c.endDate, color:isExpiring?'#F59E0B':'#0F172A'},
              {label:'Алдангийн хувь', value:c.penalty||'—', color:'#1A1A1A'},
              {label:'Холбоотой үйлчилгээ', value:`${c.totalServices} үйлчилгээ`, color:'#534AB7'},
            ].map(({label,value,color})=>(
              <div key={label} style={{background:'#F3F3F3',borderRadius:8,padding:'10px 12px'}}>
                <p style={{margin:'0 0 4px',fontSize:11,color:'#999999',fontWeight:600,textTransform:'uppercase',letterSpacing:.4}}>{label}</p>
                <p style={{margin:0,fontSize:14,fontWeight:700,color}}>{value}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Two-col layout */}
        <div className="rg-detail2">
          {/* Left col */}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>

            {/* Parties */}
            <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:8,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
              <p style={{margin:'0 0 14px',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>Талууд</p>
              {[["Үйлчилгээ нийлүүлэгч",c.parties.provider,"#EDE9FE","#5B21B6","building"],
                ["Захиалагч",c.parties.client,"#EEEDFE","#3C3489","person-circle"]].map(([role,name,bg,col,icon])=>(
                <div key={role} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'#F3F3F3',borderRadius:8,marginBottom:8}}>
                  <div style={{width:34,height:34,background:bg,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Ic n={icon} s={14} style={{color:col}}/>
                  </div>
                  <div>
                    <p style={{margin:0,fontSize:11,color:'#999999',fontWeight:600}}>{role}</p>
                    <p style={{margin:'2px 0 0',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>{name}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* Services covered */}
            <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:8,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
              <p style={{margin:'0 0 12px',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>Хамрагдах үйлчилгээнүүд</p>
              {c.services.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'#F3F3F3',borderRadius:8,marginBottom:6}}>
                  <Ic n="check-circle-fill" s={13} style={{color:'#10B981',flexShrink:0}}/>
                  <span style={{fontSize:13,color:'#1A1A1A',fontWeight:600}}>{s}</span>
                </div>
              ))}
            </div>

            {/* Timeline */}
            <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:8,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
              <p style={{margin:'0 0 16px',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>Гэрээний явц</p>
              {c.timeline.map((step,i)=>{
                const isNext = !step.done && c.timeline.slice(0,i).every(s=>s.done);
                return (
                  <div key={i} style={{display:'flex',gap:12,marginBottom:i<c.timeline.length-1?14:0}}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:step.done?'#10B981':isNext?'#FEF3C7':'#F4F6F8',
                        border:`2px solid ${step.done?'#10B981':isNext?'#F59E0B':'#E8ECEF'}`,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {step.done && <Ic n="check" s={12} style={{color:'#fff'}}/>}
                        {isNext && <div style={{width:8,height:8,borderRadius:'50%',background:'#F59E0B'}}/>}
                      </div>
                      {i<c.timeline.length-1 && <div style={{width:2,height:20,background:step.done?'#D1FAE5':'#F4F6F8',margin:'3px 0'}}/>}
                    </div>
                    <div style={{flex:1,paddingBottom:4}}>
                      <p style={{margin:'4px 0 2px',fontSize:13,fontWeight:600,color:step.done?'#0F172A':'#99AABB'}}>{step.label}</p>

              })}
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {/* Note (non-alert) */}
            {!isPending && !isExpiring && c.note && (
              <div style={{background:'#EEEDFE',border:'0.5px solid #C7D2FE',borderRadius:8,padding:'12px 16px',display:'flex',gap:8}}>
                <Ic n="info-circle-fill" s={13} style={{color:'#7F77DD',flexShrink:0,marginTop:2}}/>
                <div>
                  <p style={{margin:'0 0 3px',fontSize:12,fontWeight:700,color:'#3C3489'}}>Тэмдэглэл</p>

              </div>

            {/* File upload — pending contracts only */}
            {isPending && (
              <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:8,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>

                    <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:69,background:'#EDE9FE',color:'#5B21B6'}}>{uploadedFiles.length} файл</span>

                {/* Hidden file input */}
                <input
                  ref={fileInputRef}
                  type="file"
                  multiple
                  accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"
                  onChange={handleFileChange}
                  style={{display:'none'}}

                {/* Drop zone */}
                <div
                  onClick={()=>fileInputRef.current&&fileInputRef.current.click()}

                  onDragLeave={e=>{e.currentTarget.style.background='#F8FAFC';e.currentTarget.style.borderColor='#DDD6FE';}}
                  onDrop={e=>{
                    e.preventDefault();
                    const files=Array.from(e.dataTransfer.files);
                    const mapped=files.map(f=>({name:f.name,size:f.size,type:f.type,url:URL.createObjectURL(f)}));
                    setUploadedFiles(p=>[...p,...mapped]);
                    e.currentTarget.style.background='#F8FAFC';
                    e.currentTarget.style.borderColor='#DDD6FE';
                  }}
                  style={{border:'2px dashed #DDD6FE',borderRadius:8,padding:'18px 12px',textAlign:'center',
                    cursor:'pointer',background:'#F3F3F3',transition:'all .15s',marginBottom:uploadedFiles.length?12:0}}>
                  <Ic n="cloud-upload" s={22} style={{color:'#7C3AED',marginBottom:6}}/>

                </div>

                {/* Uploaded files list */}
                {uploadedFiles.length>0 && (
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {uploadedFiles.map((f,i)=>{
                      const fi=fileIcon(f.name);

                        <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',
                          background:'#F3F3F3',borderRadius:8,border:'0.5px solid #E8E8E8'}}>

      <div className="rg-3" >

          {bg:'#D1FAE5',border:'#A7F3D0',label:'Нийт төлөгдсөн',value:fmt(paidTotal),sub:'1-р сарын нэхэмжлэх',vc:'#065F46',lc:'#047857',icon:'check-circle-fill'},

          {tab==="invoices"?(<><option>Бүх статус</option><option>Хүлэгдэж буй</option><option>Төлөгдсөн</option><option>Цуцлагдсан</option></>):(<><option>Бүх статус</option><option>Акт хүлээгдэж буй</option><option>Баталгаажсан</option><option>Маргаантай</option></>)}

              <div className="card-foot" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:4}}>
                <div className="card-dates" style={{display:'flex',gap:16}}>
                  <span style={{fontSize:12,color:'#999999'}}>Үүссэн: <span style={{color:'#555555',fontWeight:500}}>{inv.issueDate}</span></span>
                  <span style={{fontSize:12,color:'#999999'}}>Эцсийн хугацаа: <span style={{color:inv.overdue?'#DC2626':'#445566',fontWeight:500}}>{inv.dueDate}</span></span>
                  {inv.paidDate&&<span style={{fontSize:12,color:'#999999'}}>Төлсөн: <span style={{color:'#3B6D11',fontWeight:500}}>{inv.paidDate}</span></span>}
                </div>
                <div className="card-btns" style={{display:'flex',gap:8}} onClick={e=>e.stopPropagation()}>
                  <button onClick={e=>{e.stopPropagation();const a=actList.find(x=>x.id===inv.linkedAct);if(a){setSelAct(a);setPage("act-detail");}}} style={{padding:'6px 14px',borderRadius:7,border:'0.5px solid #E8E8E8',background:'#fff',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',color:'#555555',display:'flex',alignItems:'center',gap:5}}>
                    <Ic n="file-earmark-check" s={12}/>Акт үзэх
                  </button>
                  {inv.status==="Хүлэгдэж буй"?(
                    <button onClick={e=>{e.stopPropagation();setSelInv(inv);setPS(false);setPD("");setPR("");setPF(null);setPage("inv-detail");}} style={{padding:'6px 14px',borderRadius:7,border:'none',background:'#534AB7',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',color:'#fff',display:'flex',alignItems:'center',gap:5}}>
                      <Ic n="credit-card" s={12}/>Төлбөр бүртгэх
                    </button>
                  ):(
                    <button onClick={e=>{e.stopPropagation();setSelInv(inv);setPS(false);setPage("inv-detail");}} style={{padding:'6px 14px',borderRadius:7,border:'0.5px solid #E8E8E8',background:'#fff',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',color:'#555555',display:'flex',alignItems:'center',gap:5}}>
                      Дэлгэрэнгүй
                    </button>
                  )}
                </div>
              </div>
            </div>
          ))}
          {filteredInv.length===0&&<div style={{textAlign:'center',padding:40,color:'#999999',fontSize:13}}>Нэхэмжлэх олдсонгүй</div>}
        </div>
      )}
      {/* Act cards */}
      {tab==="acts"&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {filteredActs.map(act=>(
            <div key={act.id} style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:14,padding:18,cursor:'pointer',transition:'box-shadow .15s'}} onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,.07)'} onMouseLeave={e=>e.currentTarget.style.boxShadow='none'} onClick={()=>{setSelAct(act);setRM(false);setRR("");setPage("act-detail");}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:32,height:32,borderRadius:8,background:'#F0FDF4',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Ic n="file-earmark-check" s={15} style={{color:'#059669'}}/>
                  </div>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontSize:14,fontWeight:700,color:'#1A1A1A'}}>{act.id}</span>
                      <span style={{fontSize:11,fontWeight:700,background:actSM[act.status]?.bg||'#F4F6F8',color:actSM[act.status]?.color||'#445566',padding:'3px 10px',borderRadius:69}}>{act.status}</span>
                    </div>
                    <p style={{margin:'3px 0 0',fontSize:12,color:'#666666'}}>{act.desc}</p>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <p style={{margin:'0 0 2px',fontSize:11,color:'#999999'}}>Нийт дүн</p>
                  <p style={{margin:0,fontSize:18,fontWeight:700,color:'#1A1A1A'}}>{fmt(act.total)}</p>
                  <p style={{margin:'2px 0 0',fontSize:11,color:'#999999'}}>НӨАТ орсон</p>
                </div>
              </div>
              <div className="card-foot" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:4}}>
                <div style={{display:'flex',gap:16}}>
                  <span style={{fontSize:12,color:'#999999'}}>Хугацаа: <span style={{color:'#555555',fontWeight:500}}>{act.period}</span></span>
                  <span style={{fontSize:12,color:'#999999'}}>Актын огноо: <span style={{color:'#555555',fontWeight:500}}>{act.actDate}</span></span>
                  <span style={{fontSize:12,color:'#999999'}}>{act.services.length} үйлчилгээ</span>
                </div>
                <div className="card-btns" style={{display:'flex',gap:8}} onClick={e=>e.stopPropagation()}>
                  {act.status==="Акт хүлээгдэж буй"&&(<>
                    <button onClick={e=>{e.stopPropagation();approveAct(act.id);}} style={{padding:'6px 14px',borderRadius:7,border:'none',background:'#059669',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',color:'#fff',display:'flex',alignItems:'center',gap:5}}>
                      <Ic n="check-circle-fill" s={12}/>Зөвшөөрөх
                    </button>
                    <button onClick={e=>{e.stopPropagation();setSelAct(act);setRM(true);setPage("act-detail");}} style={{padding:'6px 14px',borderRadius:7,border:'0.5px solid #FECACA',background:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',color:'#DC2626',display:'flex',alignItems:'center',gap:5}}>
                      <Ic n="x-circle" s={12}/>Буцаах
                    </button>
                  </>)}

                    Дэлгэрэнгүй

                </div>
              </div>
            </div>
          ))}
          {filteredActs.length===0&&<div style={{textAlign:'center',padding:40,color:'#999999',fontSize:13}}>Акт олдсонгүй</div>}
        </div>
      )}
    </div>
  );
}

// ── MODULE 7: Permissions ─────────────────────────────────────
function PermissionsModule() {
  const MODS    = PERM_MODS;
  const ACTIONS = PERM_ACTIONS;
  const initRoles = PERM_ROLES;

  const PALETTE = [
    {bg:"#EDE9FE",color:"#5B21B6"},{bg:"#EAF3DE",color:"#3B6D11"},
    {bg:"#EEEDFE",color:"#3C3489"},{bg:"#FAEEDA",color:"#633806"},
    {bg:"#FCE7F3",color:"#DB2777"},{bg:"#FEE2E2",color:"#991B1B"},
    {bg:"#EAF3DE",color:"#047857"},{bg:"#EEEDFE",color:"#1D4ED8"},
  ];

  const defaultPerms = () => MODS.map(()=>ACTIONS.map(()=>false));

  const [roles, setRoles]       = useState(initRoles);
  const [addModal, setAddModal] = useState(false);
  const [editModal, setEdit]    = useState(null);   // role object being edited
  const [delModal, setDel]      = useState(null);   // role to delete
  const [newName, setNewName]   = useState("");
  const [newColor, setNewColor] = useState(0);
  const [newPerms, setNP]       = useState(defaultPerms());
  const [editPerms, setEP]      = useState(null);
  const [editName, setEN]       = useState("");

  const toggleNewPerm  = (mi,ai) => setNP(p=>p.map((row,r)=>r===mi?row.map((v,c)=>c===ai?!v:v):row));
  const toggleEditPerm = (mi,ai) => setEP(p=>p.map((row,r)=>r===mi?row.map((v,c)=>c===ai?!v:v):row));

  const saveNew = () => {
    if(!newName.trim()) return;
    const pal = PALETTE[newColor];
    setRoles(p=>[...p,{id:Date.now(),name:newName.trim(),bg:pal.bg,color:pal.color,perms:newPerms}]);
    setAddModal(false); setNewName(""); setNewColor(0); setNP(defaultPerms());
  };

  const openEdit = (r) => {
    setEN(r.name);
    setEP(r.perms.map(row=>[...row]));
    setEdit(r);
  };
  const saveEdit = () => {
    setRoles(p=>p.map(r=>r.id===editModal.id?{...r,name:editName,perms:editPerms}:r));
    setEdit(null);
  };
  const confirmDel = () => {
    setRoles(p=>p.filter(r=>r.id!==delModal.id));
    setDel(null);
  };

  const PermMatrix = ({perms, toggle, readOnly=false}) => (
    <div style={{border:'0.5px solid #E8E8E8',borderRadius:8,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr repeat(5,72px)',background:'#F5F5F5',borderBottom:'0.5px solid #E8E8E8'}}>
        <div style={{padding:'8px 14px',fontSize:11,fontWeight:700,color:'#999999',textTransform:'uppercase',letterSpacing:.5}}>Модуль</div>
        {ACTIONS.map(a=><div key={a} style={{padding:'8px 0',fontSize:11,fontWeight:700,color:'#999999',textAlign:'center',textTransform:'uppercase',letterSpacing:.4}}>{a}</div>)}
      </div>
      {MODS.map((m,mi)=>(
        <div key={m} style={{display:'grid',gridTemplateColumns:'1fr repeat(5,72px)',borderBottom:mi<MODS.length-1?'0.5px solid #EBEBEB':'none',background:mi%2===0?'#fff':'#FAFBFC'}}>
          <div style={{padding:'11px 14px',fontSize:13,fontWeight:600,color:'#555555',display:'flex',alignItems:'center',gap:8}}>
            {m}
          </div>
          {ACTIONS.map((a,ai)=>(
            <div key={a} style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'8px 0'}}>
              {readOnly ? (
                <span style={{width:24,height:24,borderRadius:6,background:perms[mi]?.[ai]?'#D1FAE5':'#F4F6F8',color:perms[mi]?.[ai]?'#065F46':'#C8D0D8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>
                  {perms[mi]?.[ai]?"✓":"—"}
                </span>
              ) : (
                <button onClick={()=>toggle(mi,ai)} style={{width:28,height:28,borderRadius:7,border:'none',cursor:'pointer',background:perms[mi]?.[ai]?'#D1FAE5':'#F4F6F8',color:perms[mi]?.[ai]?'#059669':'#C8D0D8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,transition:'all .1s',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif'}}>
                  {perms[mi]?.[ai]?"✓":"—"}
                </button>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:'#1A1A1A'}}>Эрхийн тохиргоо</h2>
          <p style={{margin:'4px 0 0',fontSize:13,color:'#666666'}}>Хандалтын эрх болон дүрийн матриц (RBAC)</p>
        </div>
        <button onClick={()=>setAddModal(true)} style={{display:'flex',alignItems:'center',gap:7,padding:'9px 18px',borderRadius:6,border:'none',background:'#534AB7',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif'}}>
          <Ic n="plus-circle-fill" s={14}/>Дүр нэмэх
        </button>
      </div>

      {/* Role matrix */}
      <div style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'12px 18px',borderBottom:'0.5px solid #EBEBEB'}}>
          <span style={{fontSize:13,fontWeight:700,color:'#1A1A1A'}}>Үүсгэсэн дүрүүд</span>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:500}}>
            <thead>
              <tr style={{background:'#F5F5F5',borderBottom:'0.5px solid #E8E8E8'}}>
                <th style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:'#999999',textTransform:'uppercase',letterSpacing:.5,minWidth:150}}>Модуль</th>
                {roles.map(r=>(
                  <th key={r.id} style={{padding:'10px 12px',textAlign:'center',borderLeft:'0.5px solid #E8E8E8',minWidth:130}}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                      <span style={{fontSize:12,fontWeight:700,background:r.bg,color:r.color,padding:'4px 14px',borderRadius:69,whiteSpace:'nowrap'}}>{r.name}</span>
                      <div style={{display:'flex',gap:4}}>
                        <button onClick={()=>openEdit(r)} title="Засах" style={{width:26,height:26,borderRadius:6,border:'0.5px solid #E8E8E8',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#666666'}}>
                          <Ic n="pencil" s={11}/>
                        </button>
                        {r.id>3&&(
                          <button onClick={()=>setDel(r)} title="Устгах" style={{width:26,height:26,borderRadius:6,border:'0.5px solid #FECACA',background:'#FEF2F2',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#DC2626'}}>
                            <Ic n="trash" s={11}/>
                          </button>
                        )}
                      </div>
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {MODS.map((m,mi)=>(
                <tr key={m} style={{background:mi%2===0?'#fff':'#FAFBFC',borderBottom:'0.5px solid #EBEBEB'}}>
                  <td style={{padding:'11px 16px',fontSize:13,fontWeight:600,color:'#555555'}}>{m}</td>
                  {roles.map(r=>{
                    const row = r.perms[mi]||[];
                    const active = ACTIONS.filter((_,ai)=>row[ai]);

// ── MY TICKETS LIST ───────────────────────────────────────────
function MyTicketsModule() {
  const [filter, setFilter] = useState("Бүгд");
  const [q, setQ]           = useState("");
  const [sel, setSel]       = useState(null);
  const [tList, setTList]   = useState(TICKETS);

  const tabs = ["Бүгд","Нээлттэй","Явж байна","Шийдэгдсэн","Хаагдсан"];
  const list = tList.filter(t=>(filter==="Бүгд"||t.status===filter)&&(!q||t.title.toLowerCase().includes(q.toLowerCase())||t.id.toLowerCase().includes(q.toLowerCase())));

  const confirm = () => {
    setTList(p=>p.map(t=>t.id===sel.id?{...t,status:"Хаагдсан",resolved:true}:t));
    setSel(null);
  };
  const reopen = () => {
    setTList(p=>p.map(t=>t.id===sel.id?{...t,status:"Нээлттэй",resolved:false}:t));
    setSel(null);
  };

  const counts = {};
  tabs.forEach(tab=>{ counts[tab] = tab==="Бүгд" ? tList.length : tList.filter(t=>t.status===tab).length; });

  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h2 style={{margin:0,fontSize:20,fontWeight:700,color:'#1A1A1A'}}>Миний тикетүүд</h2><p style={{margin:'4px 0 0',fontSize:13,color:'#666666'}}>Бүх тикетийн жагсаалт ба статус</p></div>
      </div>

      <div style={{position:'relative'}}>
        <Ic n="search" s={13} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#999999',pointerEvents:'none'}}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Тикет хайх (TKT-2026-... эсвэл гарчгаар)"
          style={{width:'100%',paddingLeft:36,paddingRight:12,paddingTop:9,paddingBottom:9,fontSize:13,fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',background:'#F5F5F5',border:'0.5px solid #E8E8E8',borderRadius:8,outline:'none',color:'#1A1A1A',boxSizing:'border-box'}}
          onFocus={e=>e.target.style.borderColor='#534AB7'} onBlur={e=>e.target.style.borderColor='#E8E8E8'}/>
      </div>

      <div style={{display:'flex',gap:4,background:'#F5F5F5',padding:4,borderRadius:8,width:'fit-content',flexWrap:'wrap'}}>
        {tabs.map(tab=>(
          <button key={tab} onClick={()=>setFilter(tab)} style={{padding:'6px 14px',borderRadius:8,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',background:filter===tab?'#fff':'transparent',color:filter===tab?'#534AB7':'#667788',boxShadow:filter===tab?'0 1px 3px rgba(0,0,0,.06)':undefined,transition:'all .12s',display:'flex',alignItems:'center',gap:6}}>
            {tab}
            {counts[tab]>0&&<span style={{minWidth:18,height:18,background:filter===tab?'#EEEDFE':'#E8ECEF',color:filter===tab?'#3C3489':'#667788',borderRadius:69,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,padding:'0 4px'}}>{counts[tab]}</span>}
          </button>
        ))}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {list.map(t=>(
          <div key={t.id} onClick={()=>setSel(t)} style={{background:'#fff',border:'0.5px solid #E8E8E8',borderRadius:8,padding:'14px 18px',cursor:'pointer',transition:'all .15s',boxShadow:'0 1px 3px rgba(0,0,0,.04)',display:'flex',alignItems:'center',gap:16}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#AFA9EC';e.currentTarget.style.boxShadow='0 4px 12px rgba(37,99,235,.07)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#E8ECEF';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.04)';}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,width:90,flexShrink:0}}>
              <span style={{fontSize:11,fontWeight:700,color:'#534AB7',fontFamily:'monospace'}}>{t.id}</span>
              <PBadge priority={t.priority}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{margin:'0 0 3px',fontSize:13,fontWeight:700,color:'#1A1A1A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</p>
              <p style={{margin:0,fontSize:11,color:'#999999'}}>{t.category} · {t.service} · SLA: {t.sla.split(" ")[0]}</p>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flexShrink:0}}>
              <TBadge status={t.status}/>
              {t.assigned ? <span style={{fontSize:11,color:'#999999'}}><Ic n="person" s={11}/> {t.assigned}</span>
                : <span style={{fontSize:11,color:'#D97706',fontWeight:600}}>Хуваарилаагүй</span>}
            </div>
            <Ic n="chevron-right" s={13} style={{color:'#C8D0D8',flexShrink:0}}/>
          </div>
        ))}
        {list.length===0&&<div style={{textAlign:'center',padding:40,color:'#999999',fontSize:13}}>Тикет олдсонгүй</div>}
      </div>

      {sel&&<TicketDetailModal ticket={sel} onClose={()=>setSel(null)} onConfirm={confirm} onReopen={reopen}/>}
    </div>
  );
}

        {TICKET_NOTIFS.map((n,i)=>(
          <div key={n.id} style={{display:'flex',gap:14,padding:'14px 20px',borderBottom:i<TICKET_NOTIFS.length-1?'0.5px solid #EBEBEB':'none',alignItems:'flex-start',cursor:'pointer',transition:'background .1s'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F4F6F8'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:36,height:36,borderRadius:69,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:{warning:'#FEF3C7',success:'#D1FAE5',info:'#EEEDFE'}[n.type]}}>
              <Ic n={{warning:'exclamation-triangle',success:'check-circle',info:'info-circle'}[n.type]} s={15} style={{color:{warning:'#D97706',success:'#059669',info:'#534AB7'}[n.type]}}/>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:'0 0 2px',fontSize:13,fontWeight:700,color:'#1A1A1A'}}>{n.title}</p>
              <p style={{margin:'0 0 4px',fontSize:12,color:'#555555',lineHeight:1.5}}>{n.msg}</p>
              <p style={{margin:0,fontSize:11,color:'#999999'}}>{n.time}</p>
            </div>
            <Ic n="chevron-right" s={13} style={{color:'#C8D0D8',marginTop:2}}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── NAVIGATION GROUPS ─────────────────────────────────────────
// Харилцагчийн портал (охин компани) — no permissions
const NAV_GROUPS_CLIENT = [
  {label:"ҮНДСЭН", items:[
    {key:"dashboard", label:"Хянах самбар", icon:"grid-1x2"},
    {key:"services",  label:"Үйлчилгээ",   icon:"box-seam"},
    {key:"orders",    label:"Захиалга",     icon:"bag"},
  ]},
  {label:"САНХҮҮ", items:[
    {key:"contracts", label:"Гэрээ",  icon:"file-earmark-text", badge:1},
    {key:"billing",   label:"Төлбөр", icon:"receipt",           badge:2},
    {key:"reports",   label:"Тайлан", icon:"bar-chart-line"},
  ]},
  {label:"ТОХИРГОО", items:[
    {key:"users", label:"Хэрэглэгчид", icon:"people"},
    {key:"logs",  label:"Лог бүртгэл", icon:"clock-history"},
  ]},
];
// Платформ Админ (backoffice) — includes permissions
const NAV_GROUPS_ADMIN = [
  {label:"ҮНДСЭН", items:[
    {key:"dashboard", label:"Хянах самбар", icon:"grid-1x2"},
    {key:"services",  label:"Үйлчилгээ",   icon:"box-seam"},
    {key:"orders",    label:"Захиалга",     icon:"bag"},
  ]},
  {label:"САНХҮҮ", items:[
    {key:"contracts", label:"Гэрээ",  icon:"file-earmark-text", badge:1},
    {key:"billing",   label:"Төлбөр", icon:"receipt",           badge:2},
    {key:"reports",   label:"Тайлан", icon:"bar-chart-line"},
  ]},
  {label:"ТОХИРГОО", items:[
    {key:"users",       label:"Хэрэглэгчид",     icon:"people"},
    {key:"permissions", label:"Эрхийн тохиргоо", icon:"shield-check"},
    {key:"logs",        label:"Лог бүртгэл",      icon:"clock-history"},
  ]},
];
const NAV_GROUPS = NAV_GROUPS_ADMIN; // backward compat
const NAV_GROUPS_TICKET = [
  {label:"ТИКЕТ", items:[
    {key:"t-dashboard", label:"Хянах самбар",   icon:"grid-1x2"},
    {key:"t-new",       label:"Тикет үүсгэх",   icon:"plus-circle"},
    {key:"t-list",      label:"Миний тикетүүд", icon:"list-ul"},
    {key:"t-kb",        label:"Мэдлэгийн сан",  icon:"book"},
    {key:"t-notif", label:"Мэдэгдэл",      icon:"bell", badge:3},
  ]},
];
const PORTALS = [
  {id:"client", label:"Харилцагчийн портал",   sub:"Миний үйлчилгээ, захиалга",    icon:"briefcase",   color:"#534AB7", bg:"#EEEDFE"},
  {id:"vendor", label:"Вендор Портал", sub:"Борлуулалт, бүтээгдэхүүн",     icon:"shop",        color:"#7C3AED", bg:"#F5F3FF"},
  {id:"admin",  label:"Платформ Админ",sub:"Систем, байгууллагын хяналт",  icon:"shield-check", color:"#DC2626", bg:"#FEF2F2"},
];
const ALL_ITEMS = NAV_GROUPS_ADMIN.flatMap(g=>g.items);
const ALL_TICKET_ITEMS = NAV_GROUPS_TICKET.flatMap(g=>g.items);

// ── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [sys, setSys]         = useState("subscription"); // "subscription" | "ticket"
  const [portal, setPortal]   = useState("client"); // "client" | "vendor" | "admin"
  const [portalOpen, setPortalOpen] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [active, setActive]   = useState("dashboard");
  const [tModule, setTModule] = useState("t-dashboard");
  const [notifOpen, setNotif] = useState(false);
  const [jumpOrderId, setJumpOrderId] = useState(null);
  const navigateToOrder = (orderId) => { setActive("orders"); setJumpOrderId(orderId); };
  const unread = notifications.filter(n=>n.type!=="success").length;
  const tUnread = TICKET_NOTIFS.filter(n=>n.type!=="success").length;

  const curLabel = sys==="subscription"
    ? ALL_ITEMS.find(i=>i.key===active)?.label
    : ALL_TICKET_ITEMS.find(i=>i.key===tModule)?.label;

  const switchSys = (s) => { setSys(s); setNotif(false); };

  const renderModule = () => {
    if(sys==="subscription") {
      const MODULES = {
        dashboard:<DashboardModule onNavigate={setActive} onNavigateToOrder={navigateToOrder}/>, services:<ServiceModule onNavigate={setActive}/>, orders:<OrderModule onNavigate={setActive} jumpOrderId={jumpOrderId} onJumpDone={()=>setJumpOrderId(null)}/>,
        reports:<ReportModule/>, contracts:<ContractModule/>, billing:<BillingModule/>,
        permissions:<PermissionsModule/>, users:<UserModule/>, logs:<AuditLogModule/>,
      };
      return MODULES[active];
    }
    const setT = setTModule;
    const TMODULES = {
      "t-dashboard":<TicketDashboardModule setTModule={setT}/>,
      "t-new":<NewTicketModule setTModule={setT}/>,
      "t-list":<MyTicketsModule/>,
      "t-kb":<KnowledgeBaseModule/>,
      "t-notif":<TicketNotifsModule/>,
    };
    return TMODULES[tModule]||<TicketDashboardModule setTModule={setT}/>;
  };

  const switchPortal = (pid) => {
    setPortal(pid);
    setPortalOpen(false);
    // If switching to client portal while on permissions page, reset to dashboard
    if(pid==="client" && active==="permissions") setActive("dashboard");
  };
  const clientNavGroups = sys==="subscription" ? NAV_GROUPS_CLIENT : NAV_GROUPS_TICKET;
  const adminNavGroups  = sys==="subscription" ? NAV_GROUPS_ADMIN  : NAV_GROUPS_TICKET;
  const activeNavGroups = portal==="admin" ? adminNavGroups : clientNavGroups;
  const activeKey = sys==="subscription" ? active : tModule;
  const setActiveKey = sys==="subscription" ? setActive : setTModule;
  const curPortal = PORTALS.find(p=>p.id===portal)||PORTALS[0];

  return (
    <div style={{display:'flex',height:'100vh',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',overflow:'hidden',background:'#F0F2F5'}}>
      {/* Mobile overlay */}
      <div className={`mob-overlay${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>

      {/* ── Sidebar ── */}
      <aside className={`app-sidebar${sidebarOpen?' open':''}`} style={{width:224,background:'#FFFFFF',borderRight:'0.5px solid #E8E8E8',display:'flex',flexDirection:'column',flexShrink:0}}>
        {/* Logo */}
        <div style={{padding:'16px 14px 12px',borderBottom:'0.5px solid #E8E8E8'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,background:'#3C3489',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:13,fontWeight:700,color:'#EEEDFE',letterSpacing:0}}>T</span>
            </div>
            <div>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:'#1A1A1A',letterSpacing:.3}}>TechOn</p>
              <p style={{margin:0,fontSize:10,color:'#999999'}}>B2B Portal</p>
            </div>
          </div>
        </div>

        {/* System Toggle */}
        <div style={{padding:'10px 10px 8px',borderBottom:'0.5px solid #E8E8E8'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',background:'#F5F5F5',borderRadius:6,padding:3,gap:3}}>
            {[{id:"subscription",label:"Захиалга",icon:"box-seam"},{id:"ticket",label:"IT Дэмжлэг",icon:"headset"}].map(s=>(
              <button key={s.id} onClick={()=>switchSys(s.id)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5,padding:'7px 4px',borderRadius:7,border:'none',cursor:'pointer',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',fontSize:11,fontWeight:700,transition:'all .15s',
                background:sys===s.id?'#fff':'transparent',
                color:sys===s.id?'#534AB7':'#667788',
                boxShadow:sys===s.id?'0 1px 4px rgba(0,0,0,.08)':undefined}}>
                <Ic n={s.icon} s={12}/>{s.label}
              </button>
            ))}
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:'8px 8px',overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
          {activeNavGroups.map(g=>(
            <div key={g.label} style={{marginBottom:4}}>
              <p style={{margin:'8px 8px 3px',fontSize:10,fontWeight:500,color:'#999999',letterSpacing:.8,textTransform:'uppercase'}}>{g.label}</p>
              {g.items.map(item=>{
                const on = activeKey===item.key;
                const activeColor = sys==="subscription" ? '#3C3489' : '#5B21B6';
                const activeBg    = sys==="subscription" ? '#EEEDFE' : '#EDE9FE';
                return (
                  <button key={item.key} onClick={()=>{setActiveKey(item.key);setSidebarOpen(false);}} style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'7px 10px 7px 8px',borderRadius:6,border:'none',borderLeft:on?'2px solid #534AB7':'2px solid transparent',cursor:'pointer',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',fontSize:13,fontWeight:on?600:400,background:on?activeBg:'transparent',color:on?activeColor:'#555555',textAlign:'left',marginBottom:1,transition:'all .12s'}}
                    onMouseEnter={e=>{if(!on){e.currentTarget.style.background='#F5F5F5';e.currentTarget.style.color='#1A1A1A';}}}
                    onMouseLeave={e=>{if(!on){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#555555';}}}>
                    <Ic n={item.icon} s={15}/>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge>0&&!on&&<span style={{minWidth:18,height:18,background:'#EF4444',color:'#fff',borderRadius:69,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,padding:'0 4px'}}>{item.badge}</span>}
                    {on&&<Ic n="chevron-right" s={11} style={{color:sys==="subscription"?'#AFA9EC':'#C4B5FD'}}/>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>

        {/* User */}
        <div style={{padding:'10px 12px',borderTop:'0.5px solid #E8E8E8'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:32,height:32,borderRadius:69,background:'#EEEDFE',border:'2px solid #EEEDFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#534AB7',flexShrink:0}}>БО</div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{margin:0,fontSize:12,fontWeight:700,color:'#1A1A1A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Б. Оюунтуяа</p>
              <p style={{margin:0,fontSize:10,color:'#999999'}}>Нягтлан бодогч</p>
            </div>
            <button style={{background:'none',border:'none',cursor:'pointer',color:'#999999',display:'flex',padding:3,borderRadius:6,transition:'color .1s'}} onMouseEnter={e=>e.currentTarget.style.color='#EF4444'} onMouseLeave={e=>e.currentTarget.style.color='#99AABB'}>
              <Ic n="box-arrow-right" s={14}/>
            </button>
          </div>
        </div>
      </aside>

      {/* ── Main ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Topbar */}
        <header style={{background:'#fff',borderBottom:'0.5px solid #E8E8E8',padding:'0 16px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
            <button className="mob-ham" onClick={()=>setSidebarOpen(!sidebarOpen)} style={{display:'none',alignItems:'center',justifyContent:'center',width:34,height:34,background:'none',border:'none',cursor:'pointer',borderRadius:6,color:'#555555',marginRight:4,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background='#F5F5F5'} onMouseLeave={e=>e.currentTarget.style.background='none'}>
              <Ic n={sidebarOpen?"x-lg":"list"} s={18}/>
            </button>
            <span className="mob-hide" style={{color:'#999999',fontWeight:600,fontSize:12}}>ТАВАН БОГД НУРА</span>
            <Ic className="mob-hide" n="chevron-right" s={11} style={{color:'#C8D0D8'}}/>
            
            <span style={{color:'#1A1A1A',fontWeight:700,fontSize:13}}>{curLabel}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {/* Portal switcher in header */}
            <div style={{position:'relative'}}>
              <button onClick={()=>setPortalOpen(!portalOpen)} style={{display:'flex',alignItems:'center',gap:7,padding:'6px 12px 6px 8px',borderRadius:6,border:`1px solid ${curPortal.color}33`,background:curPortal.bg,cursor:'pointer',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',height:34,transition:'all .15s'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='.85'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                <div style={{width:20,height:20,borderRadius:5,background:curPortal.color+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Ic n={curPortal.icon} s={11} style={{color:curPortal.color}}/>
                </div>
                <span className="mob-hide" style={{fontSize:12,fontWeight:700,color:curPortal.color,whiteSpace:'nowrap'}}>{curPortal.label}</span>
                <Ic n={portalOpen?"chevron-up":"chevron-down"} s={10} style={{color:curPortal.color+'99'}}/>
              </button>
              {portalOpen&&(
                <div style={{position:'absolute',top:42,right:0,width:260,background:'#fff',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,.12)',border:'0.5px solid #E8E8E8',zIndex:200,overflow:'hidden'}}>
                  <div style={{padding:'8px 14px 6px',borderBottom:'0.5px solid #EBEBEB'}}>
                    <p style={{margin:0,fontSize:9,fontWeight:700,color:'#C8D0D8',letterSpacing:1,textTransform:'uppercase'}}>Портал сонгох</p>
                  </div>
                  {PORTALS.map(p=>(
                    <button key={p.id} onClick={()=>switchPortal(p.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',border:'none',cursor:'pointer',background:portal===p.id?p.bg:'transparent',fontFamily:'-apple-system,BlinkMacSystemFont,\'Segoe UI\',Inter,sans-serif',textAlign:'left',transition:'background .1s'}}
                      onMouseEnter={e=>{if(portal!==p.id)e.currentTarget.style.background='#F4F6F8';}}
                      onMouseLeave={e=>{if(portal!==p.id)e.currentTarget.style.background='transparent';}}>
                      <div style={{width:32,height:32,borderRadius:8,background:p.bg,border:`1px solid ${p.color}22`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <Ic n={p.icon} s={14} style={{color:p.color}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:700,color:portal===p.id?p.color:'#1A1A1A'}}>{p.label}</p>
                        <p style={{margin:0,fontSize:10,color:'#999999'}}>{p.sub}</p>
                      </div>
                      {portal===p.id&&<span style={{width:7,height:7,borderRadius:69,background:p.color,flexShrink:0}}/>}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div style={{position:'relative'}}>
              <button onClick={()=>setNotif(!notifOpen)} style={{width:34,height:34,borderRadius:8,background:'#F5F5F5',border:'0.5px solid #E8E8E8',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#EEEDFE';e.currentTarget.style.borderColor='#AFA9EC';}}
                onMouseLeave={e=>{e.currentTarget.style.background='#F4F6F8';e.currentTarget.style.borderColor='#E8ECEF';}}>
                <Ic n="bell" s={15}/>
                {(sys==="subscription"?unread:tUnread)>0&&<span style={{position:'absolute',top:-5,right:-5,width:17,height:17,background:'#EF4444',color:'#fff',borderRadius:69,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid #fff'}}>{sys==="subscription"?unread:tUnread}</span>}
              </button>
              {notifOpen&&(
                <div style={{position:'absolute',top:42,right:0,width:320,background:'#fff',borderRadius:8,boxShadow:'0 12px 24px -4px rgba(0,0,0,.12)',border:'0.5px solid #E8E8E8',zIndex:99,overflow:'hidden'}}>
                  <div style={{padding:'12px 16px',borderBottom:'0.5px solid #E8E8E8',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#1A1A1A'}}>Мэдэгдэл</span>
                    <span style={{fontSize:11,color:'#534AB7',cursor:'pointer'}}>Бүгдийг уншсан</span>
                  </div>
                  {(sys==="subscription"?notifications:TICKET_NOTIFS).map(n=>(
                    <div key={n.id} style={{padding:'11px 16px',borderBottom:'0.5px solid #EBEBEB',cursor:'pointer',display:'flex',gap:10,alignItems:'flex-start',transition:'background .1s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#F4F6F8'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{width:7,height:7,borderRadius:69,marginTop:4,flexShrink:0,background:{danger:'#EF4444',warning:'#D97706',info:'#534AB7',success:'#10B981'}[n.type]}}/>
                      <div>
                        <p style={{margin:0,fontSize:13,color:'#1A1A1A'}}>{n.msg||n.title}</p>
                        <p style={{margin:'2px 0 0',fontSize:11,color:'#999999'}}>{n.time}</p>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </header>

        {/* Content */}
        <main className="mob-pad" style={{flex:1,overflowY:'auto',padding:24}}>
          {renderModule()}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
document.getElementById("loading").style.display = "none";
</script>
</body>
</html>
