*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:#F3F3F3}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8D0D8;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#8898AA}
/* ── Responsive Grids ── */
.rg-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.rg-4g10{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rg-4g16{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.rg-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.rg-dash{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
.rg-detail{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;align-items:start}
.rg-detail2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start}
.rg-detail3{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:960px){
  .rg-4,.rg-4g10,.rg-4g16{grid-template-columns:repeat(2,1fr)}
  .rg-3{grid-template-columns:repeat(2,1fr)}
  .rg-dash{grid-template-columns:1fr}
  .rg-detail,.rg-detail2,.rg-detail3{grid-template-columns:1fr}
}
@media(max-width:540px){
  .rg-4,.rg-4g10,.rg-4g16,.rg-3{grid-template-columns:1fr}
}
/* ── Mobile Sidebar ── */
.app-sidebar{transition:transform .25s ease}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:48;cursor:pointer}
.mob-ham{display:none!important}
@media(max-width:768px){
  .app-sidebar{position:fixed!important;left:0;top:0;height:100vh;z-index:50;transform:translateX(-100%)}
  .app-sidebar.open{transform:translateX(0)!important}
  .mob-overlay.open{display:block}
  .mob-ham{display:flex!important}
  .topbar-company{display:none!important}
}
/* ── Mobile Content ── */
@media(max-width:768px){
  .mob-pad{padding:14px!important}
  .mob-header{flex-wrap:wrap;gap:8px!important}
  .mob-hide{display:none!important}
}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;background:#F3F3F3;flex-direction:column;gap:12px}
.spin{width:36px;height:36px;border:3px solid #E8ECEF;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Module Header ── */
.mod-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
@media(max-width:768px){
  .mod-header{flex-direction:column;align-items:stretch}
  .mod-header>*:last-child{width:100%!important;box-sizing:border-box}
  .mod-header button{justify-content:center}
  .mod-header select{text-align:center}
}
/* ── Order Hero Card ── */
.ord-hero{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.ord-hero-left{flex:1;min-width:0}
.ord-hero-left h2{font-size:20px;margin:0;font-weight:700;color:#1A1A1A;white-space:nowrap}
.ord-hero-right{text-align:right;flex-shrink:0;margin-left:24px}
.ord-hero-right .ord-total{font-size:26px;font-weight:700;color:#1A1A1A;line-height:1;margin:0 0 2px}
@media(max-width:540px){
  .ord-hero{flex-direction:column;gap:10px}
  .ord-hero-left h2{font-size:16px;white-space:normal;word-break:break-word}
  .ord-hero-right{text-align:left;margin-left:0}
  .ord-hero-right .ord-total{font-size:22px}
}
/* ── Card Action Rows ── */
.card-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px;flex-wrap:wrap}
.card-dates{display:flex;gap:16px;flex-wrap:wrap}
@media(max-width:768px){
  .card-foot .card-btns{margin-left:auto}
  .card-btns .btn-approve{font-size:11px!important;padding:5px 10px!important}
  .card-foot{gap:6px}
  .card-dates span{font-size:11px!important}
}
@media(max-width:480px){
  .card-foot{flex-direction:column;align-items:flex-start}
  .card-foot .card-btns{width:100%;justify-content:flex-end}
}
